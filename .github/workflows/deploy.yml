# .github/workflows/deploy.yml
# This workflow file is optional - Streamlit Cloud auto-deploys on push
# You can use this for additional CI/CD tasks like testing

name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check Python syntax
      run: |
        python -m py_compile streamlit_app.py
        python -m py_compile app/main.py
        python -m py_compile app/db.py
        python -m py_compile app/llm.py
        python -m py_compile app/vectorstore.py
    
    - name: Run tests (if available)
      run: |
        if [ -d "tests" ]; then
          pip install pytest
          pytest tests/ -v || echo "No tests found or tests failed"
        fi
      continue-on-error: true
